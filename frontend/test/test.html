<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
</head>
<body style="background-color:lightgrey">
    <h1 style="text-align:center;color:darkcyan">This is a Test Page</h1>
    <p>If you see this page, the test setup is working correctly.</p>
    <!-- 以下表单使用 GET 请求发送数据到当前的 URL，method 默认为 GET。 -->
    <form>
    <label>Name:
        <input name="submitted-name" autocomplete="name">
    </label>
    <button>Save</button>
    </form>

    <!-- 以下表单使用 POST 请求发送数据到当前的 URL。 -->
    <form method="post">
    <label>Name:
        <input name="submitted-name" autocomplete="name">
    </label>
    <button>Save</button>
    </form>

    <!-- 表单使用 fieldset, legend, 和 label 标签 -->
    <form method="post">
    <fieldset>
        <legend>Title</legend>
        <label><input type="radio" name="radio"> Select me</label>
    </fieldset>
    </form>
        
</body>
</html>
